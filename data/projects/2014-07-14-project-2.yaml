description: <strong>Thanks A Billion</strong> was a Target Campaign at thanksabillion.target.com as well as facebook. Users left thank-you notes for a special teachers. When a user would tag a qualifying school in their message, Target gave that school $25 – up to $25,000 per school – until Target donated $5 million. (Even Secretary of Education Arne Duncan gave teachers a special shout-out.) The donations helped schools afford resources to help kids succeed. <br /><br /> • <strong><a target="_blank" href="//corporate.target.com/article/2015/05/thanks-a-billion">The Campaign</a></strong> <br /> • <strong><a target="_blank" href="//corporate.target.com/article/2015/05/thanks-a-billion-impact">The Campaign Results</a></strong> <br /> • <strong><a target="_blank" href="//ellentv.com/2015/05/14/thanks-a-billion-target/">On Ellen DeGeneres</a></strong>
