description:  All tax-advantaged benefit plans must demonstrate nondiscrimination in terms of eligibility and benefits. Benefits Compliance Link can evaluate your plan's compliance and provide assistance in meeting requirements. <br /><br /> Our online system allows you to upload your plan census and test for compliance with IRC Section 105(h) and IRC Section 125. <br /><br /> Most benefit plans need to be in writing, with clear, concise, and easily understood summaries for all eligible employees. Benefits Compliance Link can create your Premium Only Plan, Wrap Plan, 105/HRA plan, and Summaries of Benefits and Coverage (SBC) documents instantly. We can also generate 125 Cafeteria plan documents within two (2) business days. <br /><br /> <strong><a target="_blank" href="//facebook.com/benecomplink">facebook.com/benecomplink</a></strong>
